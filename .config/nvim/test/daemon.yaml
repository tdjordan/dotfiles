apiversion: apps/v1
kind: DaemonSet
metadata:
  name: multi-nginx
spec:
  template:
    metadata:
      labels:
        system: DaemonSetOne
    spec:
       containers:
       - name: nginx
         image: nginx:1.7.9
         ports:
         - containerPort: 80
---
apiversion: apps/v1
